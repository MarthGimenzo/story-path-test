@if (open) {
  <div class="wp-backdrop" (click)="closed.emit()"></div>
}

<aside class="wp-panel" [class.open]="open">

  <div class="wp-header">
    <span class="wp-title">
      <i class="fa-solid fa-khanda"></i> Wapens
    </span>
    <button class="wp-close" (click)="closed.emit()" title="Sluiten">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="wp-scroll">

    <div class="wp-list">
      @if (weapons.length === 0 && !addingNew) {
        <p class="wp-empty">Geen wapens. Voeg er hieronder een toe.</p>
      }

      @for (w of weapons; track w.key) {
        @if (editingKey === w.key) {
          <div class="wp-edit-form" (click)="$event.stopPropagation()">
            <input class="wp-input" [(ngModel)]="editLabel"
                   placeholder="Naam wapen" maxlength="40"
                   (keydown.enter)="saveEdit()" (keydown.escape)="cancelEdit()">
            <div class="wp-form-actions">
              <button class="wp-btn-cancel" (click)="cancelEdit()">Annuleer</button>
              <button class="wp-btn-save" (click)="saveEdit()">Opslaan</button>
            </div>
          </div>
        } @else {
          <div class="wp-item">
            <span class="wp-item-label">{{ w.label }}</span>
            <button class="wp-item-btn wp-item-edit"
                    (click)="startEdit(w, $event)" title="Bewerk">
              <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button class="wp-item-btn wp-item-delete"
                    (click)="removeWeapon(w.key)" title="Verwijder">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        }
      }
    </div>

    @if (addingNew) {
      <div class="wp-edit-form wp-add-form" (click)="$event.stopPropagation()">
        <input class="wp-input" [(ngModel)]="newLabel"
               placeholder="Naam wapen" maxlength="40"
               (keydown.enter)="saveNew()" (keydown.escape)="cancelAdding()">
        <div class="wp-form-actions">
          <button class="wp-btn-cancel" (click)="cancelAdding()">Annuleer</button>
          <button class="wp-btn-save" (click)="saveNew()">
            <i class="fa-solid fa-plus"></i> Toevoegen
          </button>
        </div>
      </div>
    }

  </div><!-- /wp-scroll -->

  <div class="wp-footer">
    <button class="wp-add-btn" (click)="startAdding()" [disabled]="addingNew">
      <i class="fa-solid fa-plus"></i> Nieuw wapen
    </button>
  </div>

</aside>
