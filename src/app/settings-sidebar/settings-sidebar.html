@if (open) {
  <div class="sidebar-backdrop" (click)="closed.emit()"></div>
}

<aside class="sidebar" [class.open]="open">
  <div class="sidebar-header">
    <span class="sidebar-title">Instellingen</span>
    <button class="sidebar-close" (click)="closed.emit()" title="Sluiten">✕</button>
  </div>

  <div class="sidebar-section">
    <h3 class="sidebar-section-title">Startpunten</h3>
    <p class="sidebar-section-desc">
      Kies met welke karakters de game kan beginnen.
      Elke selectie vormt een eigen startverhaallijn.
    </p>
    <div class="sidebar-picker">
      @for (char of characters; track char.id) {

        @if (pendingRemovalId === char.id) {
          <!-- Bevestigingsprompt -->
          <div class="confirm-row" [style.--char-color]="char.color">
            <span class="confirm-dot" [style.background]="char.color"></span>
            <span class="confirm-text">{{ char.name }} verwijderen?</span>
            <button class="confirm-yes" (click)="confirmRemoval()">Ja</button>
            <button class="confirm-no"  (click)="cancelRemoval()">Nee</button>
          </div>
        } @else {
          <button
            class="char-chip"
            [class.active]="selectedStarters.has(char.id)"
            [style.--char-color]="char.color"
            (click)="handleChipClick(char.id)"
          >
            <span class="char-dot" [style.background]="char.color"></span>
            <span class="char-name">{{ char.name }}</span>
          </button>
        }

      }
    </div>
  </div>
</aside>
