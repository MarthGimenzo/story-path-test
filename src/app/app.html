<div class="page">

  <app-settings-sidebar
    [characters]="characters"
    [selectedStarters]="selectedStarters"
    [open]="settingsOpen"
    (toggled)="toggleStarter($event)"
    (closed)="settingsOpen = false"
  />

  <header class="header">
    <span class="header-icon">⚔</span>
    <div class="header-text">
      <h1 class="header-title">Story Path</h1>
      <p class="header-sub">JRPG verhaallijn visualisatie</p>
    </div>
    <button class="settings-btn" (click)="settingsOpen = true" title="Instellingen">
      <i class="fa-solid fa-sliders"></i>
      Instellingen
    </button>
  </header>

  <app-story-canvas
    [nodes]="nodes"
    [edges]="edges"
    [characters]="characters"
    (encounterAdded)="onEncounterAdded($event)"
    (mergeRequested)="onMergeRequested($event)"
    (nodeRemoved)="onNodeRemoved($event)"
    (characterLeft)="onCharacterLeft($event)"
    (characterMoved)="onCharacterMoved($event)"
    (eventInserted)="onEventInserted($event)"
    (eventAppended)="onEventAppended($event)"
  />

</div>
