<div class="page">

  <!-- Header -->
  <header class="header">
    <span class="header-icon">⚔</span>
    <div>
      <h1 class="header-title">Story Path</h1>
      <p class="header-sub">JRPG verhaallijn visualisatie</p>
    </div>
  </header>

  <!-- Startpunten picker -->
  <section class="starter-picker">
    <h2 class="section-label">Startpunten kiezen</h2>
    <div class="picker-grid">
      @for (char of characters; track char.id) {
        <button
          class="char-chip"
          [class.active]="selectedStarters.has(char.id)"
          [style.--char-color]="char.color"
          (click)="toggleStarter(char.id)"
        >
          <span class="char-dot" [style.background]="char.color"></span>
          <span class="char-name">{{ char.name }}</span>
        </button>
      }
    </div>
  </section>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <svg
      [attr.width]="svgWidth"
      [attr.height]="SVG_HEIGHT"
      class="story-svg"
    >
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7"
                refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#7c5cbf" />
        </marker>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <!-- Verticale tijdlijn-banen -->
      @for (node of nodes; track node.id) {
        @if (node.row === 0) {
          <line
            [attr.x1]="getNodeCenterX(node)"
            [attr.y1]="0"
            [attr.x2]="getNodeCenterX(node)"
            [attr.y2]="SVG_HEIGHT"
            stroke="#1e2a3a"
            stroke-width="1"
            stroke-dasharray="4,8"
          />
        }
      }

      <!-- Rij-labels -->
      <text
        [attr.x]="PADDING_X - 10"
        [attr.y]="getRowLabelY(0)"
        text-anchor="end"
        fill="#3a5068"
        font-size="11"
        font-family="monospace"
        letter-spacing="1"
      >BEGIN</text>

      <text
        [attr.x]="PADDING_X - 10"
        [attr.y]="getRowLabelY(1)"
        text-anchor="end"
        fill="#3a5068"
        font-size="11"
        font-family="monospace"
        letter-spacing="1"
      >H.1</text>

      <!-- Pijlen -->
      @for (edge of edges; track edge.id) {
        <path
          [attr.d]="getEdgePath(edge)"
          fill="none"
          stroke="#5a3a8a"
          stroke-width="2"
          stroke-dasharray="6,4"
          marker-end="url(#arrow)"
          opacity="0.85"
        />
      }

      <!-- Nodes -->
      @for (node of nodes; track node.id) {
        <g [attr.transform]="'translate(' + getNodeX(node) + ',' + getNodeY(node) + ')'">

          <rect
            [attr.width]="NODE_WIDTH"
            [attr.height]="NODE_HEIGHT"
            rx="10"
            [attr.fill]="getNodeFill(node.type)"
            [attr.stroke]="getNodeStroke(node)"
            stroke-width="1.5"
            [attr.filter]="node.type === 'start' ? 'url(#glow)' : null"
          />

          <rect
            x="10" y="8"
            rx="4"
            height="16"
            [attr.width]="node.label.length * 7 + 12"
            [attr.fill]="getNodeFill(node.type)"
            [attr.stroke]="getTypeLabelColor(node.type)"
            stroke-width="1"
            opacity="0.9"
          />
          <text
            x="16" y="20"
            [attr.fill]="getTypeLabelColor(node.type)"
            font-size="10"
            font-family="monospace"
            letter-spacing="0.5"
            font-weight="bold"
          >{{ node.label }}</text>

          <text
            [attr.x]="NODE_WIDTH / 2"
            y="44"
            text-anchor="middle"
            fill="#c8d8e8"
            font-size="12"
            font-family="'Segoe UI', Arial, sans-serif"
          >{{ node.description }}</text>

          @for (charId of node.characters; track charId; let i = $index) {
            <circle
              [attr.cx]="getDotX(i, node.characters.length)"
              [attr.cy]="getDotY()"
              r="9"
              [attr.fill]="getCharacter(charId)?.color ?? '#546e7a'"
              opacity="0.9"
            />
            <text
              [attr.x]="getDotX(i, node.characters.length)"
              [attr.y]="getDotY() + 4"
              text-anchor="middle"
              fill="#000"
              font-size="9"
              font-weight="bold"
              font-family="Arial, sans-serif"
            >{{ (getCharacter(charId)?.name ?? '')[0] }}</text>
          }

        </g>
      }

      <!-- Lege staat -->
      @if (nodes.length === 0) {
        <text
          [attr.x]="svgWidth / 2"
          [attr.y]="SVG_HEIGHT / 2"
          text-anchor="middle"
          fill="#3a5068"
          font-size="14"
          font-family="monospace"
        >Kies minimaal één startpunt hierboven</text>
      }

    </svg>
  </div>

  <!-- Karakter-roster -->
  <section class="roster">
    <h2 class="section-label">Bondgenoten</h2>
    <div class="roster-grid">
      @for (char of characters; track char.id) {
        <div class="char-chip static">
          <span class="char-dot" [style.background]="char.color"></span>
          <span class="char-name">{{ char.name }}</span>
        </div>
      }
    </div>
  </section>

</div>
